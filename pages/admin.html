<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Admin Panel - PENDPROF</title>

  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/navbar.css?v=5">
  <style id="mobile-navbar-fix">
    @media (max-width: 768px) {
      body.nav-open {
        overflow: hidden;
      }

      body.nav-open::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: 998;
        background: rgba(15, 77, 58, 0.28);
        backdrop-filter: blur(3px);
      }

      .navbar {
        z-index: 1000;
      }

      .menu-toggle {
        display: inline-flex !important;
        align-items: center;
        justify-content: center;
        width: 48px !important;
        height: 48px !important;
        border: 0 !important;
        border-radius: 8px !important;
        background: #eaf4ef !important;
        box-shadow: inset 0 0 0 1px rgba(15, 77, 58, 0.12), 0 10px 22px rgba(15, 77, 58, 0.12) !important;
      }

      .menu-toggle.active {
        background: #0F4D3A !important;
      }

      .menu-toggle.active span::before,
      .menu-toggle.active span::after {
        background: #ffffff !important;
      }

      .navbar .nav-links {
        position: fixed !important;
        top: 92px !important;
        left: 16px !important;
        right: 16px !important;
        z-index: 1002 !important;
        display: none !important;
        grid-template-columns: 1fr !important;
        gap: 10px !important;
        width: auto !important;
        padding: 14px !important;
        border: 1px solid rgba(15, 77, 58, 0.14) !important;
        border-radius: 8px !important;
        background: linear-gradient(180deg, #ffffff 0%, #f4faf7 100%) !important;
        box-shadow: 0 24px 60px rgba(15, 77, 58, 0.24) !important;
        opacity: 0 !important;
        overflow: hidden !important;
        pointer-events: none !important;
        transform: translateY(-10px) scale(0.98) !important;
        transform-origin: top right !important;
      }

      .navbar .nav-links.active {
        display: grid !important;
        opacity: 1 !important;
        pointer-events: auto !important;
        transform: translateY(0) scale(1) !important;
      }

      .navbar .nav-links::before {
        content: "Menu SIPIL CARE";
        display: block;
        padding: 6px 8px 10px;
        color: #0F4D3A;
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .navbar .nav-links a {
        display: flex !important;
        align-items: center !important;
        justify-content: space-between !important;
        width: 100% !important;
        min-height: 54px !important;
        padding: 0 16px 0 18px !important;
        border: 1px solid rgba(15, 77, 58, 0.1) !important;
        border-left: 5px solid #0F4D3A !important;
        border-radius: 8px !important;
        background: #ffffff !important;
        color: #1f302a !important;
        font-size: 16px !important;
        font-weight: 800 !important;
        box-shadow: 0 10px 20px rgba(15, 77, 58, 0.08) !important;
      }

      .navbar .nav-links a::after {
        content: ">";
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: rgba(217, 197, 41, 0.28);
        color: #0F4D3A;
        font-size: 16px;
        font-weight: 900;
      }
    }
  </style>
  <link rel="stylesheet" href="../css/admin.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <!-- NAVBAR -->

  <header class="navbar">

    <div class="logo-section">

      <img src="../assets/images/logo-hms.png" alt="Logo HMS">

      <div class="logo-text">
        <h1>PENDPROF</h1>
        <p>Engineering Resource Platform</p>
      </div>

    </div>

  </header>

  <!-- ADMIN PANEL -->

  <section class="admin-panel">

    <div class="admin-container">

      <h2>Add New Resource</h2>

      <form id="resourceForm">

        <input
          type="text"
          id="title"
          placeholder="Resource Title"
          required
        >

        <input
          type="text"
          id="category"
          placeholder="Category"
          required
        >

        <textarea
          id="description"
          placeholder="Description"
          required
        ></textarea>

        <input
          type="url"
          id="link"
          placeholder="Resource Link"
          required
        >

        <button type="submit">
          Add Resource
        </button>

      </form>

    </div>

  </section>

  <script src="../js/admin.js"></script>

</body>

</html>
